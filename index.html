<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>縦スクロールシューティング</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    #gameCanvas {
      border: 2px solid #333;
      display: block;
    }
    #ui {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #overlay {
      background: rgba(0,0,0,0.85);
      color: #fff;
      text-align: center;
      padding: 40px;
      border: 2px solid #0ff;
      border-radius: 8px;
      min-width: 300px;
    }
    #overlay h1 { font-size: 2.5em; color: #0ff; margin-bottom: 10px; text-shadow: 0 0 20px #0ff; }
    #overlay h2 { font-size: 1.8em; color: #f0f; margin-bottom: 10px; text-shadow: 0 0 20px #f0f; }
    #overlay p { font-size: 1em; color: #aaa; margin: 6px 0; }
    #overlay .score-display { font-size: 1.4em; color: #ff0; margin: 15px 0; }
    #overlay button {
      margin-top: 20px;
      padding: 12px 32px;
      font-size: 1.1em;
      background: transparent;
      color: #0ff;
      border: 2px solid #0ff;
      border-radius: 4px;
      cursor: pointer;
      pointer-events: all;
      transition: all 0.2s;
      font-family: 'Courier New', monospace;
    }
    #overlay button:hover { background: #0ff; color: #000; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="overlay">
    <h1>STAR SHOOTER</h1>
    <p>矢印キー / WASD : 移動</p>
    <p>スペース / Z : 射撃</p>
    <p>X : ボム</p>
    <p style="margin-top:10px; color:#f80;">敵を倒してスコアを稼げ！</p>
    <button id="startBtn">ゲームスタート</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

// --- Canvas sizing ---
const W = 480, H = 640;
canvas.width = W;
canvas.height = H;

// --- Game state ---
let state = 'title'; // 'title' | 'playing' | 'gameover'
let godMode = false;
let score = 0, hiScore = parseInt(localStorage.getItem('hiScore') || '0');
let lives = 3, bombs = 3, level = 1;
let frame = 0;
let waveIndex = 0, waveSpawnCount = 0;
let waveBanner = 0, waveBannerText = '', waveBannerColor = '#fff';
let currentTier; // set in startGame()

// --- Input ---
const keys = {};
document.addEventListener('keydown', e => {
  if (!keys[e.code]) {
    keys[e.code] = true;
    if (state === 'playing' && (e.code === 'KeyX' || e.code === 'ShiftLeft')) useBomb();
    if (state === 'playing' && e.code === 'KeyF') godMode = !godMode;
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// --- Touch controls ---
let touchX = null, touchFiring = false;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchX = t.clientX;
  touchFiring = true;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchX = t.clientX;
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchX = null;
  touchFiring = false;
}, { passive: false });

// --- Stars ---
const STAR_COUNT = 80;
let stars = [];
function initStars() {
  stars = Array.from({ length: STAR_COUNT }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    speed: 0.5 + Math.random() * 2,
    size: Math.random() * 2,
    brightness: 0.4 + Math.random() * 0.6,
  }));
}

function updateStars() {
  for (const s of stars) {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  }
}

function drawStars() {
  for (const s of stars) {
    ctx.globalAlpha = s.brightness;
    ctx.fillStyle = '#fff';
    ctx.fillRect(s.x, s.y, s.size + 0.5, s.size + 0.5);
  }
  ctx.globalAlpha = 1;
}

// --- Player ---
let player = {};
function initPlayer() {
  player = {
    x: W / 2, y: H - 80,
    w: 32, h: 36,
    speed: 5,
    shotCooldown: 0,
    invincible: 0,
    bombing: 0,
  };
}

function drawPlayer() {
  if (player.invincible > 0 && Math.floor(frame / 4) % 2 === 0) return;
  ctx.save();
  ctx.translate(player.x, player.y);

  // Engine glow
  const grd = ctx.createRadialGradient(0, 20, 2, 0, 20, 14);
  grd.addColorStop(0, 'rgba(0,160,255,0.9)');
  grd.addColorStop(1, 'rgba(0,80,200,0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.ellipse(0, 20, 8, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Ship body
  ctx.fillStyle = '#4af';
  ctx.beginPath();
  ctx.moveTo(0, -18);
  ctx.lineTo(16, 14);
  ctx.lineTo(8, 8);
  ctx.lineTo(0, 12);
  ctx.lineTo(-8, 8);
  ctx.lineTo(-16, 14);
  ctx.closePath();
  ctx.fill();

  // Center stripe
  ctx.fillStyle = '#8df';
  ctx.beginPath();
  ctx.moveTo(0, -18);
  ctx.lineTo(5, 6);
  ctx.lineTo(0, 10);
  ctx.lineTo(-5, 6);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(0, -6, 4, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Hitbox indicator (center dot)
  ctx.fillStyle = 'rgba(255,80,80,0.9)';
  ctx.beginPath();
  ctx.arc(0, 0, 2.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// --- Audio ---
let audioCtx = null;

function unlockAudio() {
  // ブラウザの自動再生ポリシー対策: ユーザー操作のタイミングで必ず初期化
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// 初回ユーザー操作でAudioContextを解放
document.addEventListener('keydown', unlockAudio, { once: false });
document.addEventListener('pointerdown', unlockAudio, { once: false });

function playSfx(type) {
  if (!audioCtx || audioCtx.state !== 'running') return;
  try {
    const ac = audioCtx;
    const now = ac.currentTime;

    if (type === 'shoot') {
      // プレイヤー射撃: 短い高音パルス
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(880, now);
      osc.frequency.exponentialRampToValueAtTime(440, now + 0.05);
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      osc.start(now); osc.stop(now + 0.06);

    } else if (type === 'enemyDeath') {
      // 敵撃破: 低めのドスン
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(40, now + 0.18);
      gain.gain.setValueAtTime(0.22, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      osc.start(now); osc.stop(now + 0.2);

    } else if (type === 'hardHit') {
      // 硬い敵へのヒット: 甲高い金属音 (square 1800→320Hz + sawtooth倍音)
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(1800, now);
      osc.frequency.exponentialRampToValueAtTime(320, now + 0.07);
      gain.gain.setValueAtTime(0.25, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.start(now); osc.stop(now + 0.1);

      const osc2 = ac.createOscillator();
      const gain2 = ac.createGain();
      osc2.connect(gain2); gain2.connect(ac.destination);
      osc2.type = 'sawtooth';
      osc2.frequency.setValueAtTime(3200, now);
      osc2.frequency.exponentialRampToValueAtTime(800, now + 0.05);
      gain2.gain.setValueAtTime(0.12, now);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      osc2.start(now); osc2.stop(now + 0.06);

    } else if (type === 'playerHit') {
      // 自機被弾: 低いノイズ的な音
      const buf = ac.createBuffer(1, ac.sampleRate * 0.25, ac.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
      const src = ac.createBufferSource();
      const gain = ac.createGain();
      const filter = ac.createBiquadFilter();
      filter.type = 'lowpass'; filter.frequency.value = 400;
      src.buffer = buf;
      src.connect(filter); filter.connect(gain); gain.connect(ac.destination);
      gain.gain.setValueAtTime(0.4, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      src.start(now);
    }
  } catch (_) {}
}

// --- Bullets ---
let bullets = [];
let enemyBullets = [];

function firePlayer() {
  if (player.shotCooldown > 0) return;
  const lvlBonus = Math.min(level - 1, 4);
  // Level upgrades spread
  if (lvlBonus >= 4) {
    bullets.push({ x: player.x - 14, y: player.y - 10, vx: -1, vy: -14, w: 4, h: 12, power: 1 });
    bullets.push({ x: player.x, y: player.y - 14, vx: 0, vy: -14, w: 4, h: 12, power: 1 });
    bullets.push({ x: player.x + 14, y: player.y - 10, vx: 1, vy: -14, w: 4, h: 12, power: 1 });
  } else if (lvlBonus >= 2) {
    bullets.push({ x: player.x - 8, y: player.y - 12, vx: -0.5, vy: -14, w: 4, h: 12, power: 1 });
    bullets.push({ x: player.x + 8, y: player.y - 12, vx: 0.5, vy: -14, w: 4, h: 12, power: 1 });
  } else {
    bullets.push({ x: player.x, y: player.y - 16, vx: 0, vy: -14, w: 4, h: 12, power: 1 });
  }
  player.shotCooldown = Math.max(6, 10 - lvlBonus);
  playSfx('shoot');
}

function drawBullets() {
  for (const b of bullets) {
    ctx.save();
    const grd = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    grd.addColorStop(0, '#fff');
    grd.addColorStop(0.4, '#0ff');
    grd.addColorStop(1, 'rgba(0,255,255,0)');
    ctx.fillStyle = grd;
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 8;
    ctx.fillRect(b.x - b.w / 2, b.y - b.h, b.w, b.h);
    ctx.restore();
  }
}

function drawEnemyBullets() {
  for (const b of enemyBullets) {
    ctx.save();
    ctx.fillStyle = '#f44';
    ctx.shadowColor = '#f00';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// --- Enemies ---
let enemies = [];
let formationPivots = [];
let spawnTimer = 0;
const ENEMY_TYPES = [
  { // 0: basic
    w: 32, h: 28, hp: 1, score: 100, speed: 1.5, color: '#f80', fireRate: 0,
    draw(e) {
      ctx.save(); ctx.translate(e.x, e.y);
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.moveTo(0, 14); ctx.lineTo(-16, -12); ctx.lineTo(0, -6); ctx.lineTo(16, -12);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#fa0';
      ctx.beginPath(); ctx.ellipse(0, 2, 5, 5, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  },
  { // 1: fast zigzag
    w: 28, h: 24, hp: 1, score: 150, speed: 3, color: '#f0a', fireRate: 0,
    draw(e) {
      ctx.save(); ctx.translate(e.x, e.y);
      ctx.fillStyle = '#f0a';
      ctx.beginPath();
      ctx.moveTo(0, 12); ctx.lineTo(-14, -10); ctx.lineTo(0, -4); ctx.lineTo(14, -10);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.ellipse(0, 0, 4, 4, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  },
  { // 2: tank
    w: 40, h: 36, hp: 4, score: 300, speed: 0.8, color: '#0f8', fireRate: 90,
    draw(e) {
      ctx.save(); ctx.translate(e.x, e.y);
      ctx.fillStyle = '#0a5';
      ctx.fillRect(-20, -18, 40, 36);
      ctx.fillStyle = '#0f8';
      ctx.fillRect(-14, -12, 28, 24);
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#0a5';
      ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  },
  { // 3: bomber (fires spread)
    w: 36, h: 32, hp: 3, score: 250, speed: 1.0, color: '#ff0', fireRate: 70,
    draw(e) {
      ctx.save(); ctx.translate(e.x, e.y);
      ctx.fillStyle = '#880';
      ctx.beginPath();
      ctx.moveTo(0, 16); ctx.lineTo(-18, -14); ctx.lineTo(-8, -8);
      ctx.lineTo(0, -12); ctx.lineTo(8, -8); ctx.lineTo(18, -14);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ff0';
      ctx.beginPath(); ctx.ellipse(0, 0, 8, 8, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  },
];

// --- Boss ---
let boss = null;
let bossWarning = 0;

function spawnBoss() {
  bossWarning = 120;
  setTimeout(() => {
    boss = {
      x: W / 2, y: -80,
      targetY: 100,
      w: 80, h: 70,
      hp: 80 + level * 30,
      maxHp: 80 + level * 30,
      score: 5000 + level * 1000,
      phase: 0,
      fireTimer: 0,
      moveTimer: 0,
      dx: 1.5,
      alive: true,
    };
  }, 2000);
}

function drawBoss() {
  if (!boss) return;
  ctx.save();
  ctx.translate(boss.x, boss.y);

  // Shadow/glow
  ctx.shadowColor = '#f00';
  ctx.shadowBlur = 20;

  // Body
  ctx.fillStyle = '#500';
  ctx.beginPath();
  ctx.moveTo(0, -35);
  ctx.lineTo(40, -10);
  ctx.lineTo(40, 20);
  ctx.lineTo(20, 35);
  ctx.lineTo(-20, 35);
  ctx.lineTo(-40, 20);
  ctx.lineTo(-40, -10);
  ctx.closePath();
  ctx.fill();

  // Armor plates
  ctx.fillStyle = '#900';
  ctx.fillRect(-38, -8, 76, 26);

  // Core
  const pulse = 0.7 + 0.3 * Math.sin(frame * 0.1);
  const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, 20);
  grd.addColorStop(0, `rgba(255,${Math.floor(pulse*100)},0,1)`);
  grd.addColorStop(1, 'rgba(200,0,0,0)');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(0, 5, 20, 0, Math.PI*2); ctx.fill();

  // Eyes
  ctx.fillStyle = '#ff0';
  ctx.beginPath(); ctx.arc(-15, -15, 7, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(15, -15, 7, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-15, -14, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(15, -14, 3, 0, Math.PI*2); ctx.fill();

  ctx.restore();

  // HP bar
  const barW = 320, barH = 16;
  const bx = (W - barW) / 2, by = 20;
  ctx.fillStyle = '#300';
  ctx.fillRect(bx, by, barW, barH);
  const hpRatio = boss.hp / boss.maxHp;
  const hpColor = hpRatio > 0.5 ? '#0f0' : hpRatio > 0.25 ? '#ff0' : '#f00';
  ctx.fillStyle = hpColor;
  ctx.fillRect(bx, by, barW * hpRatio, barH);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, barW, barH);
  ctx.fillStyle = '#fff';
  ctx.font = '11px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(`BOSS  HP: ${boss.hp}`, W / 2, by + 12);
}

// --- Particles ---
let particles = [];

// --- Explosion animations ---
let explosions = [];

const EXPLOSION_CONFIGS = {
  hit:    { size: 9,  frames: 14, emberCount: 0 },
  small:  { size: 20, frames: 26, emberCount: 5 },
  medium: { size: 32, frames: 38, emberCount: 9 },
  big:    { size: 58, frames: 56, emberCount: 16 },
};

function addExplosion(x, y, type, color) {
  const c = EXPLOSION_CONFIGS[type];
  const embers = Array.from({ length: c.emberCount }, () => ({
    angle: Math.random() * Math.PI * 2,
    speed: 0.35 + Math.random() * 0.65,
    r: 1.5 + Math.random() * 2.5,
    col: Math.random() < 0.35 ? '#fff' : Math.random() < 0.5 ? '#ff8' : color,
  }));
  explosions.push({ x, y, frame: 0, maxFrame: c.frames, size: c.size, color, type, embers });
}

function drawExplosions() {
  for (const e of explosions) {
    const t = e.frame / e.maxFrame; // 0→1
    const { x, y, size, color } = e;
    ctx.save();

    // 1. Shockwave ring (first 45%)
    if (t < 0.45) {
      const rt = t / 0.45;
      ctx.globalAlpha = (1 - rt) * 0.85;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = Math.max(0.5, 3.5 * (1 - rt));
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(x, y, size * 1.7 * rt, 0, Math.PI * 2);
      ctx.stroke();
    }

    // 2. Secondary ring for medium/big (offset timing)
    if (e.type !== 'hit' && e.type !== 'small' && t > 0.12 && t < 0.75) {
      const rt = (t - 0.12) / 0.63;
      ctx.globalAlpha = (1 - rt) * 0.45;
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.shadowColor = color;
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(x, y, size * 2.3 * rt, 0, Math.PI * 2);
      ctx.stroke();
    }

    // 3. Main fireball (grows then shrinks, peaks at t=0.4)
    const fireT = Math.max(0, Math.sin(t * Math.PI * 1.1));
    const fireR = size * fireT;
    if (fireR > 0.5) {
      const fireAlpha = t < 0.55 ? 1 : (1 - t) / 0.45;
      const grd = ctx.createRadialGradient(x, y, 0, x, y, fireR);
      grd.addColorStop(0,   `rgba(255,255,220,${fireAlpha})`);
      grd.addColorStop(0.2, `rgba(255,200,50,${fireAlpha * 0.95})`);
      grd.addColorStop(0.5, `rgba(255,90,10,${fireAlpha * 0.85})`);
      grd.addColorStop(0.8, `rgba(120,20,0,${fireAlpha * 0.5})`);
      grd.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.globalAlpha = 1;
      ctx.fillStyle = grd;
      ctx.shadowColor = color;
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(x, y, fireR, 0, Math.PI * 2);
      ctx.fill();
    }

    // 4. Central white flash (very early)
    if (t < 0.22) {
      const ft = 1 - t / 0.22;
      ctx.globalAlpha = ft * 0.95;
      ctx.fillStyle = '#fff';
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 24;
      ctx.beginPath();
      ctx.arc(x, y, size * 0.45 * ft, 0, Math.PI * 2);
      ctx.fill();
    }

    // 5. Ember streaks
    ctx.shadowBlur = 0;
    for (const em of e.embers) {
      const dist = size * em.speed * t * 2.5;
      const ex = x + Math.cos(em.angle) * dist;
      const ey = y + Math.sin(em.angle) * dist;
      const emAlpha = t < 0.55 ? 1 : (1 - t) / 0.45;
      ctx.globalAlpha = emAlpha * 0.9;
      ctx.fillStyle = em.col;
      ctx.beginPath();
      ctx.arc(ex, ey, em.r * (1 - t * 0.6), 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.globalAlpha = 1;
    ctx.restore();
    e.frame++;
  }
  explosions = explosions.filter(e => e.frame <= e.maxFrame);
}

function spawnExplosion(x, y, color = '#f80', count = 16, big = false) {
  // Particle debris
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    const speed = big ? (2 + Math.random() * 5) : (1 + Math.random() * 3);
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: big ? 50 + Math.random() * 30 : 30 + Math.random() * 20,
      maxLife: big ? 80 : 50,
      size: big ? (3 + Math.random() * 5) : (1.5 + Math.random() * 3),
      color,
    });
  }
  // Explosion sprite
  const type = big ? 'big' : count >= 12 ? 'medium' : count >= 7 ? 'small' : 'hit';
  addExplosion(x, y, type, color);
}

function updateParticles() {
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95;
    p.life--;
    return p.life > 0;
  });
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- Power-ups ---
let powerUps = [];

function spawnPowerUp(x, y) {
  if (Math.random() > 0.3) return;
  const types = ['power', 'bomb', 'life'];
  const type = types[Math.floor(Math.random() * types.length)];
  powerUps.push({ x, y, vy: 1.5, type, life: 400, frame: 0 });
}

function drawPowerUps() {
  for (const p of powerUps) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.frame * 0.04);
    const colors = { power: '#0ff', bomb: '#f0f', life: '#f44' };
    const labels = { power: 'P', bomb: 'B', life: '♥' };
    ctx.shadowColor = colors[p.type];
    ctx.shadowBlur = 10;
    ctx.strokeStyle = colors[p.type];
    ctx.lineWidth = 2;
    ctx.strokeRect(-12, -12, 24, 24);
    ctx.fillStyle = colors[p.type];
    ctx.font = 'bold 16px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(labels[p.type], 0, 0);
    ctx.restore();
    p.frame++;
  }
}

// --- Bomb effect ---
let bombEffect = 0;

function useBomb() {
  if (bombs <= 0 || bombEffect > 0) return;
  bombs--;
  bombEffect = 80;
  // Destroy all enemy bullets
  for (const b of enemyBullets) spawnExplosion(b.x, b.y, '#fff', 4);
  enemyBullets.length = 0;
  // Damage all enemies
  for (const e of enemies) {
    e.hp -= 5;
    spawnExplosion(e.x, e.y, '#ff0', 8);
  }
  if (boss) {
    boss.hp = Math.max(0, boss.hp - 40);
    spawnExplosion(boss.x, boss.y, '#f80', 30, true);
  }
}

// --- Movement patterns ---
// Each pattern: update(e) mutates e.x, e.y per frame
const MOVE_PATTERNS = {
  straight(e) {
    e.y += e.speed;
  },
  zigzag(e) {
    e.phase += 0.08;
    e.x += Math.sin(e.phase) * 3.5;
    e.y += e.speed;
  },
  wave(e) {
    e.phase += 0.04;
    e.x += Math.sin(e.phase) * 1.8;
    e.y += e.speed * 0.8;
  },
  bounce(e) {
    e.y += e.speed;
    e.x += e.dx;
    if (e.x < 20 || e.x > W - 20) e.dx *= -1;
  },
  dive(e) {
    // Rush toward player X then straighten out
    if (e.y < e.diveTargetY) {
      e.x += (e.diveTargetX - e.x) * 0.04;
      e.y += e.speed * 1.5;
    } else {
      e.y += e.speed;
    }
  },
  circle(e) {
    e.phase += 0.06;
    e.y += e.speed * 0.6;
    e.x = e.originX + Math.sin(e.phase) * e.circleR;
  },
  rush(e) {
    // Pause near top, then charge down fast
    if (e.y < e.rushWaitY) {
      e.y += e.speed * 0.4;
    } else if (!e.rushing) {
      e.rushing = true;
    }
    if (e.rushing) {
      e.y += e.speed * 3.5;
      e.x += (e.rushTargetX - e.x) * 0.05;
    }
  },
  slalom(e) {
    // Diagonal alternating direction
    e.phase += 0.03;
    e.y += e.speed;
    e.x += e.slalomDir * e.speed * 1.2;
    if (e.x < 20 || e.x > W - 20) {
      e.slalomDir *= -1;
      e.y += 10;
    }
  },
  swoop(e) {
    // Arc in from side, swoop down across screen
    e.phase += 0.04;
    const t2 = e.phase;
    e.x = e.swoopStartX + Math.sin(t2) * e.swoopAmp * Math.exp(-t2 * 0.1);
    e.y += e.speed * (0.5 + t2 * 0.06);
  },
  formation(e) {
    // Position is driven by shared pivot object
    e.x = e.formation.pivot.x + e.formation.ox;
    e.y = e.formation.pivot.y + e.formation.oy;
  },
};

// 'formation' is internal-only, not used for solo spawns
const PATTERN_NAMES = Object.keys(MOVE_PATTERNS).filter(n => n !== 'formation');

// --- Formation system ---
const FORMATION_SHAPES = {
  line_h:  (n) => Array.from({length: n}, (_, i) => ({ ox: (i - (n-1)/2) * 42, oy: 0 })),
  line_v:  (n) => Array.from({length: n}, (_, i) => ({ ox: 0, oy: (i - (n-1)/2) * 36 })),
  v_shape: (n) => Array.from({length: n}, (_, i) => ({ ox: (i-(n-1)/2)*40, oy:  Math.abs(i-(n-1)/2)*20 })),
  arrow:   (n) => Array.from({length: n}, (_, i) => ({ ox: (i-(n-1)/2)*40, oy: -Math.abs(i-(n-1)/2)*20 })),
  diamond: ()  => [{ ox:0, oy:-44 },{ ox:-44, oy:0 },{ ox:44, oy:0 },{ ox:0, oy:44 }],
  cross:   ()  => [{ ox:0, oy:0 },{ ox:-44, oy:0 },{ ox:44, oy:0 },{ ox:0, oy:-44 },{ ox:0, oy:44 }],
};
const FORMATION_SHAPE_NAMES = Object.keys(FORMATION_SHAPES);
// Patterns suitable for whole-formation movement (no player-targeting)
const FORMATION_PATTERNS = ['straight', 'zigzag', 'wave', 'bounce'];

// --- Difficulty wave rhythm ---
// Pattern: easy→easy→medium→easy→hard→easy→hard→vhard, then repeat (escalating with level)
const WAVE_RHYTHM = ['easy', 'easy', 'medium', 'easy', 'hard', 'easy', 'hard', 'vhard'];
const TIER_CONFIG = {
  easy:   { label: 'EASY',      color: '#0f0', spawnRate: 108, maxSpawns: 8,  formChance: 0.00, typeMax: 0, fireMult: 2.2 },
  medium: { label: 'CAUTION',   color: '#ff0', spawnRate: 65,  maxSpawns: 12, formChance: 0.20, typeMax: 1, fireMult: 1.3 },
  hard:   { label: 'DANGER',    color: '#f80', spawnRate: 38,  maxSpawns: 16, formChance: 0.50, typeMax: 2, fireMult: 1.0 },
  vhard:  { label: '!! MAX !!', color: '#f00', spawnRate: 18,  maxSpawns: 22, formChance: 0.72, typeMax: 3, fireMult: 0.6 },
};

function advanceWave() {
  waveIndex++;
  waveSpawnCount = 0;
  currentTier = TIER_CONFIG[WAVE_RHYTHM[waveIndex % WAVE_RHYTHM.length]];
  waveBannerText = currentTier.label;
  waveBannerColor = currentTier.color;
  waveBanner = 90;
}

function spawnFormation() {
  const availableShapes = Math.min(1 + Math.floor(level * 0.8), FORMATION_SHAPE_NAMES.length);
  const shapeName = FORMATION_SHAPE_NAMES[Math.floor(Math.random() * availableShapes)];
  const needsCount = ['line_h', 'line_v', 'v_shape', 'arrow'].includes(shapeName);
  const count = needsCount ? (3 + Math.floor(Math.random() * 2)) : undefined;
  const offsets = needsCount ? FORMATION_SHAPES[shapeName](count) : FORMATION_SHAPES[shapeName]();

  const typeMax = Math.min(currentTier.typeMax + Math.floor(level / 3), ENEMY_TYPES.length - 1);
  const typeIndex = Math.floor(Math.random() * (typeMax + 1));
  const t = ENEMY_TYPES[typeIndex];

  const fPatCount = Math.min(1 + Math.floor(level * 0.5), FORMATION_PATTERNS.length);
  const patternName = FORMATION_PATTERNS[Math.floor(Math.random() * fPatCount)];

  const pivot = {
    x: 60 + Math.random() * (W - 120),
    y: -60,
    speed: t.speed * (0.75 + level * 0.04),
    phase: Math.random() * Math.PI * 2,
    dx: Math.random() < 0.5 ? 1.8 : -1.8,
    patternName,
    members: [],
  };
  formationPivots.push(pivot);

  for (const { ox, oy } of offsets) {
    const e = {
      x: pivot.x + ox, y: pivot.y + oy,
      w: t.w, h: t.h,
      hp: t.hp + Math.floor(level / 3),
      maxHp: t.hp + Math.floor(level / 3),
      score: Math.floor(t.score * 0.7),
      speed: pivot.speed,
      color: t.color,
      typeIndex,
      patternName: 'formation',
      fireTimer: Math.floor(Math.random() * (t.fireRate || 1)),
      phase: pivot.phase,
      alive: true,
      formation: { pivot, ox, oy },
      dx: pivot.dx,
      originX: pivot.x + ox,
      randFireRate: Math.max(50, Math.floor((240 - level * 12 + Math.random() * 80) * currentTier.fireMult)),
    };
    pivot.members.push(e);
    enemies.push(e);
  }
}

// --- Spawn logic ---
function spawnEnemy() {
  const x = 30 + Math.random() * (W - 60);
  const typeMax = Math.min(currentTier.typeMax + Math.floor(level / 3), ENEMY_TYPES.length - 1);
  const typeIndex = Math.floor(Math.random() * (typeMax + 1));
  const t = ENEMY_TYPES[typeIndex];

  // Available patterns increase with level
  const availableCount = Math.min(2 + Math.floor(level * 1.2), PATTERN_NAMES.length);
  const patternName = PATTERN_NAMES[Math.floor(Math.random() * availableCount)];

  const e = {
    x, y: -30,
    w: t.w, h: t.h,
    hp: t.hp + Math.floor(level / 3),
    maxHp: t.hp + Math.floor(level / 3),
    score: t.score,
    speed: t.speed * (1 + level * 0.05),
    color: t.color,
    typeIndex,
    patternName,
    fireTimer: Math.floor(Math.random() * (t.fireRate || 1)),
    phase: Math.random() * Math.PI * 2,
    alive: true,
    // pattern-specific init
    dx: Math.random() < 0.5 ? 1.8 : -1.8,
    originX: x,
    circleR: 40 + Math.random() * 30,
    diveTargetX: player.x + (Math.random() - 0.5) * 100,
    diveTargetY: 80 + Math.random() * 120,
    rushWaitY: 60 + Math.random() * 80,
    rushTargetX: player.x + (Math.random() - 0.5) * 60,
    rushing: false,
    slalomDir: Math.random() < 0.5 ? 1 : -1,
    swoopStartX: x,
    swoopAmp: (Math.random() < 0.5 ? 1 : -1) * (60 + Math.random() * 80),
    randFireRate: Math.max(40, Math.floor((200 - level * 12 + Math.random() * 80) * currentTier.fireMult)),
  };
  enemies.push(e);
}

// --- HUD ---
function drawHUD() {
  // Background bar
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, H - 44, W, 44);

  // Lives
  for (let i = 0; i < lives; i++) {
    ctx.save();
    ctx.translate(20 + i * 26, H - 22);
    ctx.scale(0.5, 0.5);
    ctx.fillStyle = '#4af';
    ctx.beginPath();
    ctx.moveTo(0, -18); ctx.lineTo(16, 14); ctx.lineTo(8, 8);
    ctx.lineTo(0, 12); ctx.lineTo(-8, 8); ctx.lineTo(-16, 14);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // Bombs
  for (let i = 0; i < bombs; i++) {
    ctx.fillStyle = '#f0f';
    ctx.shadowColor = '#f0f';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(110 + i * 22, H - 22, 7, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Score
  ctx.fillStyle = '#ff0';
  ctx.font = 'bold 16px Courier New';
  ctx.textAlign = 'right';
  ctx.fillText(`SCORE: ${score}`, W - 10, H - 26);
  ctx.fillStyle = '#888';
  ctx.font = '11px Courier New';
  ctx.fillText(`HI: ${hiScore}`, W - 10, H - 10);

  // Level
  ctx.fillStyle = '#0ff';
  ctx.font = 'bold 13px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(`LV.${level}`, W / 2, H - 10);

  // God mode indicator
  if (godMode) {
    ctx.fillStyle = `rgba(255,255,0,${0.6 + 0.4 * Math.sin(frame * 0.15)})`;
    ctx.font = 'bold 13px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText('[GOD MODE]', 8, 16);
  }
}

// --- Collision ---
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax - aw/2 < bx + bw/2 && ax + aw/2 > bx - bw/2 &&
         ay - ah/2 < by + bh/2 && ay + ah/2 > by - bh/2;
}

function circleRect(cx, cy, cr, rx, ry, rw, rh) {
  return cx > rx - rw/2 - cr && cx < rx + rw/2 + cr &&
         cy > ry - rh/2 - cr && cy < ry + rh/2 + cr;
}

// --- Player hit ---
function hitPlayer() {
  if (godMode || player.invincible > 0 || player.bombing > 0) return;
  lives--;
  player.invincible = 150;
  playSfx('playerHit');
  spawnExplosion(player.x, player.y, '#4af', 20, true);
  if (lives <= 0) {
    state = 'gameover';
    if (score > hiScore) { hiScore = score; localStorage.setItem('hiScore', hiScore); }
    showOverlay('gameover');
  }
}

// --- Overlay ---
function showOverlay(type) {
  overlay.innerHTML = '';
  if (type === 'gameover') {
    overlay.innerHTML = `
      <h2>GAME OVER</h2>
      <div class="score-display">SCORE: ${score}</div>
      <p>HI-SCORE: ${hiScore}</p>
      <button id="startBtn">もう一度プレイ</button>`;
  } else if (type === 'levelup') {
    overlay.innerHTML = `
      <h2 style="color:#ff0">LEVEL ${level}!</h2>
      <p style="color:#0ff">次のステージへ...</p>`;
    overlay.classList.remove('hidden');
    setTimeout(() => { overlay.classList.add('hidden'); }, 1500);
    return;
  }
  overlay.classList.remove('hidden');
  document.getElementById('startBtn').addEventListener('click', startGame);
}

// --- Enemy kill score display ---
let scorePopups = [];

function addScorePopup(x, y, pts) {
  scorePopups.push({ x, y, pts, life: 50 });
}

function drawScorePopups() {
  for (const p of scorePopups) {
    ctx.globalAlpha = p.life / 50;
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 14px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(`+${p.pts}`, p.x, p.y);
    p.y -= 0.6;
    p.life--;
  }
  ctx.globalAlpha = 1;
  scorePopups = scorePopups.filter(p => p.life > 0);
}

// --- Main update ---
function update() {
  frame++;

  // Player movement
  let dx = 0, dy = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) dx -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) dx += 1;
  if (keys['ArrowUp'] || keys['KeyW']) dy -= 1;
  if (keys['ArrowDown'] || keys['KeyS']) dy += 1;

  // Touch move
  if (touchX !== null) {
    const canvasRect = canvas.getBoundingClientRect();
    const scaleX = W / canvasRect.width;
    const tx = (touchX - canvasRect.left) * scaleX;
    if (Math.abs(tx - player.x) > 5) dx = tx > player.x ? 1 : -1;
  }

  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
  player.x = Math.max(20, Math.min(W - 20, player.x + dx * player.speed));
  player.y = Math.max(20, Math.min(H - 50, player.y + dy * player.speed));

  // Auto-fire / manual fire
  if (keys['Space'] || keys['KeyZ'] || touchFiring) firePlayer();
  if (player.shotCooldown > 0) player.shotCooldown--;
  if (player.invincible > 0) player.invincible--;
  if (player.bombing > 0) player.bombing--;

  // Stars
  updateStars();

  // Bullets
  bullets = bullets.filter(b => {
    b.x += b.vx; b.y += b.vy;
    return b.y > -20 && b.y < H + 20 && b.x > -10 && b.x < W + 10;
  });
  enemyBullets = enemyBullets.filter(b => {
    b.x += b.vx; b.y += b.vy;
    return b.y < H + 20 && b.y > -20 && b.x > -10 && b.x < W + 10;
  });

  // Wave-driven spawn
  const scaledSpawnRate = Math.max(14, Math.floor(currentTier.spawnRate * Math.pow(0.93, level - 1)));
  spawnTimer++;
  if (!boss && spawnTimer >= scaledSpawnRate) {
    spawnTimer = 0;
    waveSpawnCount++;
    const fChance = Math.min(currentTier.formChance + level * 0.02, 0.85);
    if (level >= 2 && Math.random() < fChance) {
      spawnFormation();
    } else {
      spawnEnemy();
    }
    if (waveSpawnCount >= currentTier.maxSpawns) advanceWave();
  }

  // Update formation pivots (once per frame, shared by all members)
  for (const p of formationPivots) {
    MOVE_PATTERNS[p.patternName](p);
  }
  formationPivots = formationPivots.filter(p => p.members.length > 0);

  // Boss warning
  if (bossWarning > 0) bossWarning--;

  // Level progression
  const levelThreshold = 3000 + level * 2000;
  if (score >= levelThreshold && !boss) {
    level++;
    bombs = Math.min(bombs + 1, 5);
    spawnBoss();
    showOverlay('levelup');
  }

  // Boss movement
  if (boss) {
    if (boss.y < boss.targetY) boss.y += 1.2;
    boss.x += boss.dx * (1 + boss.phase * 0.3);
    if (boss.x > W - 60 || boss.x < 60) boss.dx *= -1;
    boss.moveTimer++;

    // Boss fire
    boss.fireTimer++;
    const bossFireRate = Math.max(20, 50 - boss.phase * 10);
    if (boss.fireTimer >= bossFireRate) {
      boss.fireTimer = 0;
      const patterns = boss.phase + 1;
      for (let i = 0; i < patterns * 4 + 4; i++) {
        const angle = (Math.PI * 2 * i) / (patterns * 4 + 4) + frame * 0.02;
        const speed = 2.5 + boss.phase * 0.5;
        enemyBullets.push({ x: boss.x, y: boss.y + 20, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, r: 5 });
      }
    }

    // Boss HP phases
    const hpRatio = boss.hp / boss.maxHp;
    boss.phase = hpRatio < 0.25 ? 3 : hpRatio < 0.5 ? 2 : hpRatio < 0.75 ? 1 : 0;

    // Boss bullet hits
    for (const b of bullets) {
      if (circleRect(boss.x, boss.y, 2, b.x, b.y, boss.w, boss.h)) {
        boss.hp--;
        b.remove = true;
        spawnExplosion(b.x, b.y, '#f80', 4);
      }
    }
    bullets = bullets.filter(b => !b.remove);

    if (boss.hp <= 0) {
      score += boss.score;
      addScorePopup(boss.x, boss.y, boss.score);
      spawnExplosion(boss.x, boss.y, '#f80', 40, true);
      spawnExplosion(boss.x - 20, boss.y - 20, '#fff', 20, true);
      spawnExplosion(boss.x + 20, boss.y + 10, '#ff0', 20, true);
      spawnPowerUp(boss.x, boss.y);
      spawnPowerUp(boss.x + 30, boss.y);
      boss = null;
    }

    // Player-boss collision (center hitbox)
    if (boss && rectsOverlap(player.x, player.y, 8, 8, boss.x, boss.y, boss.w, boss.h)) {
      hitPlayer();
    }
  }

  // Enemy update
  for (const e of enemies) {
    const t = ENEMY_TYPES[e.typeIndex];
    MOVE_PATTERNS[e.patternName](e);

    // Fire (all enemies aim at player; type-specific fireRate overrides randFireRate)
    e.fireTimer++;
    const fireRate = t.fireRate > 0 ? t.fireRate : e.randFireRate;
    if (e.fireTimer >= fireRate) {
      e.fireTimer = 0;
      const dx2 = player.x - e.x, dy2 = player.y - e.y;
      const dist = Math.sqrt(dx2 * dx2 + dy2 * dy2);
      if (e.typeIndex === 3) {
        // spread shot
        for (let i = -2; i <= 2; i++) {
          const ang = Math.atan2(dy2, dx2) + i * 0.3;
          enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(ang) * 2.5, vy: Math.sin(ang) * 2.5, r: 4 });
        }
      } else {
        // aimed shot
        enemyBullets.push({ x: e.x, y: e.y, vx: (dx2/dist) * 2.5, vy: (dy2/dist) * 2.5, r: 4 });
      }
    }

    // Player-enemy collision (center hitbox: 8x8)
    if (rectsOverlap(player.x, player.y, 8, 8, e.x, e.y, e.w - 4, e.h - 4)) {
      hitPlayer();
      e.hp = 0;
    }

    // Bullet-enemy collision
    for (const b of bullets) {
      if (!b.remove && rectsOverlap(b.x, b.y, b.w, b.h, e.x, e.y, e.w, e.h)) {
        e.hp -= b.power;
        b.remove = true;
        spawnExplosion(b.x, b.y, '#ff0', 4);
        if (e.maxHp > 1) playSfx('hardHit');
      }
    }
    bullets = bullets.filter(b => !b.remove);
  }

  // Remove dead/off-screen enemies
  enemies = enemies.filter(e => {
    const remove = e.hp <= 0 || e.y >= H + 50;
    if (remove) {
      if (e.hp <= 0) {
        score += e.score;
        addScorePopup(e.x, e.y, e.score);
        spawnExplosion(e.x, e.y, '#f80', 12, false);
        playSfx('enemyDeath');
        spawnPowerUp(e.x, e.y);
      }
      if (e.formation) {
        const members = e.formation.pivot.members;
        const idx = members.indexOf(e);
        if (idx !== -1) members.splice(idx, 1);
      }
      return false;
    }
    return true;
  });

  // Enemy bullet-player collision (center point: radius 5)
  const HIT_R = 5;
  for (const b of enemyBullets) {
    const ddx = b.x - player.x, ddy = b.y - player.y;
    if (ddx * ddx + ddy * ddy < (b.r + HIT_R) * (b.r + HIT_R)) {
      hitPlayer();
      b.remove = true;
    }
  }
  enemyBullets = enemyBullets.filter(b => !b.remove);

  // Power-up update
  powerUps = powerUps.filter(p => {
    p.y += p.vy; p.life--;
    if (Math.abs(p.x - player.x) < 20 && Math.abs(p.y - player.y) < 20) {
      if (p.type === 'power') level = Math.min(level + 1, 5);
      else if (p.type === 'bomb') bombs = Math.min(bombs + 1, 5);
      else if (p.type === 'life') lives = Math.min(lives + 1, 5);
      spawnExplosion(p.x, p.y, '#fff', 8);
      return false;
    }
    return p.y < H + 20 && p.life > 0;
  });

  // Particles
  updateParticles();
}

// --- Draw ---
function draw() {
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, W, H);

  drawStars();
  drawExplosions();
  drawParticles();

  // Bomb flash
  if (bombEffect > 0) {
    ctx.fillStyle = `rgba(255,255,255,${(bombEffect / 80) * 0.4})`;
    ctx.fillRect(0, 0, W, H);
    bombEffect--;
  }

  // Formation links (draw before enemies)
  ctx.save();
  ctx.strokeStyle = 'rgba(100,200,255,0.18)';
  ctx.lineWidth = 1;
  for (const p of formationPivots) {
    if (p.members.length < 2) continue;
    ctx.beginPath();
    ctx.moveTo(p.members[0].x, p.members[0].y);
    for (let i = 1; i < p.members.length; i++) ctx.lineTo(p.members[i].x, p.members[i].y);
    ctx.closePath();
    ctx.stroke();
  }
  ctx.restore();

  // Enemies
  for (const e of enemies) {
    const t = ENEMY_TYPES[e.typeIndex];
    t.draw(e);
    // HP bar for tough enemies
    if (e.maxHp > 1) {
      ctx.fillStyle = '#600'; ctx.fillRect(e.x - 16, e.y - e.h/2 - 8, 32, 4);
      ctx.fillStyle = '#0f0'; ctx.fillRect(e.x - 16, e.y - e.h/2 - 8, 32 * (e.hp/e.maxHp), 4);
    }
  }

  drawBoss();
  drawBullets();
  drawEnemyBullets();
  drawPowerUps();
  drawPlayer();
  drawScorePopups();

  // Wave banner
  if (waveBanner > 0) {
    const fadeIn = 14, fadeOut = 18;
    let alpha = 1;
    if (waveBanner > 90 - fadeIn) alpha = (90 - waveBanner) / fadeIn;
    else if (waveBanner < fadeOut) alpha = waveBanner / fadeOut;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 30, W, 34);
    ctx.fillStyle = waveBannerColor;
    ctx.shadowColor = waveBannerColor;
    ctx.shadowBlur = 14;
    ctx.font = 'bold 20px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`◆ ${waveBannerText} ◆`, W / 2, 47);
    ctx.restore();
    waveBanner--;
  }

  drawHUD();

  // Boss warning
  if (bossWarning > 60) {
    ctx.fillStyle = `rgba(255,0,0,${((bossWarning - 60) / 60) * 0.6})`;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('!! WARNING !!', W/2, H/2);
    ctx.textBaseline = 'alphabetic';
  }
}

// --- Game loop ---
function loop() {
  if (state === 'playing') {
    update();
    draw();
  }
  requestAnimationFrame(loop);
}

// --- Start ---
function startGame() {
  state = 'playing';
  score = 0; lives = 3; bombs = 3; level = 1;
  frame = 0; spawnTimer = 0; bossWarning = 0;
  waveIndex = 0; waveSpawnCount = 0; waveBanner = 0;
  currentTier = TIER_CONFIG[WAVE_RHYTHM[0]];
  enemies.length = 0; formationPivots.length = 0; bullets.length = 0;
  enemyBullets.length = 0; particles.length = 0; explosions.length = 0;
  powerUps.length = 0; scorePopups.length = 0;
  boss = null; bombEffect = 0;
  initPlayer();
  initStars();
  overlay.classList.add('hidden');
}

startBtn.addEventListener('click', () => { unlockAudio(); startGame(); });

initStars();
loop();
</script>
